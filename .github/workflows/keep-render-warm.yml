name: Keep Render warm

# Ping /health của BE (Go/Gin trên Render gói Free) định kỳ để service không
# "ngủ đông" sau 15 phút không request — tránh cold-start ~30-60s làm treo màn
# hình khi khách đang thao tác ngắt quãng ở xưởng.
#
# URL lấy từ biến repo RENDER_BASE_URL (Settings → Secrets and variables →
# Actions → Variables), ví dụ: https://the-fulfillment-api.onrender.com
# Không hardcode URL vào git để dễ đổi và không lộ hạ tầng.

on:
  schedule:
    - cron: '*/5 * * * *' # mỗi 5 phút (GitHub có thể trễ vài phút lúc tải cao)
  workflow_dispatch: {} # cho phép bấm chạy tay để hâm nóng trước buổi demo

# Không chạy chồng nếu lần trước còn đang đánh thức server.
concurrency:
  group: keep-render-warm
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping BE /health
        env:
          BASE_URL: ${{ vars.RENDER_BASE_URL }}
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "::error::Chưa set biến RENDER_BASE_URL. Vào Settings → Secrets and variables → Actions → Variables → New variable, tên RENDER_BASE_URL, giá trị là URL Render (vd https://xxx.onrender.com)."
            exit 1
          fi
          URL="${BASE_URL%/}/health"
          echo "Pinging $URL"
          # --max-time 120: đủ để request đầu tiên đánh thức server đang ngủ (cold start).
          # --retry: thử lại nếu server chưa kịp lên.
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            --max-time 120 --retry 3 --retry-delay 10 --retry-all-errors \
            "$URL" || echo "000")
          echo "HTTP $code"
          if [ "$code" = "200" ]; then
            echo "✅ Server thức và khỏe."
          else
            echo "::warning::/health trả về $code — server có thể đang khởi động lại, lần ping sau sẽ ổn."
          fi
