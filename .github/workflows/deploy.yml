name: Deploy to VPS

# Tự chạy mỗi khi push lên nhánh main
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Lấy code
        uses: actions/checkout@v4

      - name: Chuẩn bị khóa SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Đẩy code lên VPS (giữ .env.docker trên server)
        run: |
          rsync -az --delete \
            --exclude='.git' --exclude='.github' \
            --exclude='.env' --exclude='.env.docker' --exclude='.env.docker.local' \
            --exclude='node_modules' --exclude='.output' --exclude='.nuxt' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ root@${{ secrets.VPS_HOST }}:/root/FFM/THE-fulfillment-web/

      - name: Deploy zero-downtime (build → rollout → caddy)
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.VPS_HOST }} '
            set -e

            exec 9>/tmp/ffm-deploy.lock
            flock -w 300 9 || {
              echo "deploy khác đang chạy — bỏ qua lần này"
              exit 1
            }

            cd /root/FFM/THE-fulfillment-web

            # Tự cài docker rollout nếu VPS chưa có
            test -f ~/.docker/cli-plugins/docker-rollout || {
              mkdir -p ~/.docker/cli-plugins
              curl -fsSL \
                https://raw.githubusercontent.com/Wowu/docker-rollout/master/docker-rollout \
                -o ~/.docker/cli-plugins/docker-rollout
              chmod +x ~/.docker/cli-plugins/docker-rollout
            }

            DC="docker compose --env-file .env.docker -f docker-compose.yml -f docker-compose.server.yml"
            RO="docker rollout -f docker-compose.yml -f docker-compose.server.yml --env-file .env.docker"

            $DC build
            $RO backend
            $RO frontend
            $DC up -d caddy
          '

      - name: Kiểm tra /health sau deploy
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.VPS_HOST }} '
            for i in $(seq 1 30); do
              STATUS=$(curl -s \
                -o /dev/null \
                -w "%{http_code}" \
                https://fulfillment.bacgiangdecor.com/health)

              echo "Health check lần $i: HTTP $STATUS"

              if [ "$STATUS" = "200" ]; then
                echo "health OK"
                exit 0
              fi

              sleep 3
            done

            echo "health FAIL"
            exit 1
           '